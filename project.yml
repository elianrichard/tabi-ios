name: Tabi
settings:
  MARKETING_VERSION: "1.0"
  CURRENT_PROJECT_VERSION: 1
  base:
    GENERATE_INFOPLIST_FILE: YES
options:
  bundleIdPrefix: com.sora
  attributes:
    LastUpgradeCheck: 1600
packages:
  Lottie:
    url: https://github.com/airbnb/lottie-spm.git
    minorVersion: 4.5.0
targets:
  Tabi:
    type: application
    platform: iOS
    sources: [Tabi]
    resources: [Resources]
    files:
      - path: "Tabi.app"
        type: wrapper.application
        buildPhase: none
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sora.Tabi
      INFOPLIST_FILE: Tabi/Info.plist
      base:
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_ASSET_PATHS: '"Tabi/Resources/Preview Content"'
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations:
          [
            "UIInterfaceOrientationLandscapeLeft",
            "UIInterfaceOrientationLandscapeRight",
            "UIInterfaceOrientationPortrait",
          ]
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.travel"
        INFOPLIST_KEY_CFBundleDisplayName: Tabi
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    dependencies:
      - package: Lottie
  TabiTests:
    type: bundle.unit-test
    platform: iOS
    sources: [TabiTests]
    dependencies:
      - target: Tabi
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Tabi.app/Tabi"
        BUNDLE_LOADER: "$(TEST_HOST)"
schemes:
  Tabi:
    build:
      targets:
        Tabi: all
        TabiTests: all
    test:
      targets:
        - name: TabiTests
      gatherCoverageData: true
